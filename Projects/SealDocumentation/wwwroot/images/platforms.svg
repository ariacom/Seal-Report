<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 650" width="960" height="650" role="img" aria-labelledby="depTitle">
  <title id="depTitle">Deployment and publication</title>
  <style>
    text { font-family: Lato, 'Segoe UI', Arial, sans-serif; fill: #242424; }
    .grp { fill: none; stroke: #999; stroke-width: 1.2; stroke-dasharray: 7 4; }
    .grpt { font-size: 14px; font-weight: 700; fill: #242424; }
    .sub { font-size: 11px; font-style: italic; fill: #666; }
    .card { fill: #fdf1e7; stroke: #e59a55; stroke-width: 1.5; }
    .cardt { font-size: 12px; font-weight: 700; text-anchor: middle; }
    .doc { fill: #e9f6df; stroke: #7cc24c; stroke-width: 1.5; }
    .doct { font-size: 11px; font-weight: 700; text-anchor: middle; }
    .bub { fill: #eef7fd; stroke: #0E97EE; stroke-width: 1.5; }
    .bubt { font-size: 12px; text-anchor: middle; fill: #242424; }
    .arrow { stroke: #0E97EE; stroke-width: 1.8; fill: none; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0E97EE"/>
    </marker>
  </defs>

  <!-- Windows -->
  <rect class="grp" x="250" y="20" width="690" height="175" rx="4"/>
  <text class="grpt" x="266" y="44">Windows</text>
  <text class="sub" x="266" y="62">Reference system to edit the configuration, reports and schedules before publication</text>
  <rect class="card" x="266" y="78" width="150" height="42" rx="8"/>
  <text class="cardt" x="341" y="103">Server Manager</text>
  <rect class="card" x="430" y="78" width="150" height="42" rx="8"/>
  <text class="cardt" x="505" y="103">Report Designer</text>
  <rect class="card" x="594" y="78" width="160" height="42" rx="8"/>
  <text class="cardt" x="674" y="103">Web Report Server</text>
  <rect class="card" x="266" y="132" width="150" height="42" rx="8"/>
  <text class="cardt" x="341" y="157">Task Scheduler</text>
  <rect class="card" x="430" y="132" width="150" height="42" rx="8"/>
  <text class="cardt" x="505" y="157">Scheduler Service</text>
  <rect class="card" x="594" y="132" width="160" height="42" rx="8"/>
  <text class="cardt" x="674" y="157">Scheduler Worker</text>
  <g>
    <rect class="doc" x="808" y="82" width="110" height="70" rx="6" transform="translate(12,-12)"/>
    <rect class="doc" x="808" y="82" width="110" height="70" rx="6" transform="translate(6,-6)"/>
    <rect class="doc" x="808" y="82" width="110" height="70" rx="6"/>
    <text class="doct" x="863" y="112">Repository</text>
    <text class="doct" x="863" y="128">Files</text>
  </g>

  <!-- Linux -->
  <rect class="grp" x="250" y="235" width="690" height="120" rx="4"/>
  <text class="grpt" x="266" y="259">Linux</text>
  <text class="sub" x="266" y="277">Schedules executed by the Scheduler Worker or within the Web Report Server</text>
  <rect class="card" x="266" y="293" width="160" height="42" rx="8"/>
  <text class="cardt" x="346" y="318">Web Report Server</text>
  <rect class="card" x="440" y="293" width="160" height="42" rx="8"/>
  <text class="cardt" x="520" y="318">Scheduler Worker</text>
  <g>
    <rect class="doc" x="808" y="273" width="110" height="70" rx="6" transform="translate(12,-12)"/>
    <rect class="doc" x="808" y="273" width="110" height="70" rx="6" transform="translate(6,-6)"/>
    <rect class="doc" x="808" y="273" width="110" height="70" rx="6"/>
    <text class="doct" x="863" y="303">Repository</text>
    <text class="doct" x="863" y="319">Files</text>
  </g>

  <!-- Azure (Windows) -->
  <rect class="grp" x="250" y="375" width="690" height="120" rx="4"/>
  <text class="grpt" x="266" y="399">Azure (Windows)</text>
  <text class="sub" x="266" y="417">Schedules executed by the Scheduler Service or within the Web Report Server</text>
  <rect class="card" x="266" y="433" width="160" height="42" rx="8"/>
  <text class="cardt" x="346" y="458">Web Report Server</text>
  <rect class="card" x="440" y="433" width="160" height="42" rx="8"/>
  <text class="cardt" x="520" y="458">Scheduler Service</text>
  <g>
    <rect class="doc" x="808" y="413" width="110" height="70" rx="6" transform="translate(12,-12)"/>
    <rect class="doc" x="808" y="413" width="110" height="70" rx="6" transform="translate(6,-6)"/>
    <rect class="doc" x="808" y="413" width="110" height="70" rx="6"/>
    <text class="doct" x="863" y="443">Repository</text>
    <text class="doct" x="863" y="459">Files</text>
  </g>

  <!-- Azure (Linux) -->
  <rect class="grp" x="250" y="515" width="690" height="120" rx="4"/>
  <text class="grpt" x="266" y="539">Azure (Linux)</text>
  <text class="sub" x="266" y="557">Schedules executed by the Scheduler Worker or within the Web Report Server</text>
  <rect class="card" x="266" y="573" width="160" height="42" rx="8"/>
  <text class="cardt" x="346" y="598">Web Report Server</text>
  <rect class="card" x="440" y="573" width="160" height="42" rx="8"/>
  <text class="cardt" x="520" y="598">Scheduler Worker</text>
  <g>
    <rect class="doc" x="808" y="553" width="110" height="70" rx="6" transform="translate(12,-12)"/>
    <rect class="doc" x="808" y="553" width="110" height="70" rx="6" transform="translate(6,-6)"/>
    <rect class="doc" x="808" y="553" width="110" height="70" rx="6"/>
    <text class="doct" x="863" y="583">Repository</text>
    <text class="doct" x="863" y="599">Files</text>
  </g>

  <!-- Deploy bubble and arrows -->
  <line class="arrow" x1="230" y1="107" x2="230" y2="575"/>
  <line class="arrow" x1="250" y1="107" x2="232" y2="107" transform="translate(0,0)"/>
  <rect class="bub" x="20" y="280" width="190" height="76" rx="10"/>
  <text class="bubt" x="115" y="308">Deploy the distribution</text>
  <text class="bubt" x="115" y="326">and publish the</text>
  <text class="bubt" x="115" y="344">repository files</text>
  <line class="arrow" x1="210" y1="318" x2="230" y2="318"/>
  <line class="arrow" x1="230" y1="295" x2="248" y2="295" marker-end="url(#arr)"/>
  <line class="arrow" x1="230" y1="435" x2="248" y2="435" marker-end="url(#arr)"/>
  <line class="arrow" x1="230" y1="575" x2="248" y2="575" marker-end="url(#arr)"/>
</svg>

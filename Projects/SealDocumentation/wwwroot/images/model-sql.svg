<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 500" width="640" height="500" role="img" aria-labelledby="msqTitle">
  <title id="msqTitle">SQL model processing</title>
  <style>
    text { font-family: Lato, 'Segoe UI', Arial, sans-serif; fill: #242424; }
    .start { fill: #fdf1e7; stroke: #e59a55; stroke-width: 1.5; }
    .startt { font-size: 12.5px; font-weight: 700; text-anchor: middle; }
    .proc { fill: #fff; stroke: #888; stroke-width: 1.2; stroke-dasharray: 6 3; }
    .proct { font-size: 11.5px; text-anchor: middle; fill: #333; }
    .tbl { fill: #fff8dd; stroke: #e6c229; stroke-width: 1.5; }
    .tblh { fill: #f5dd86; stroke: #e6c229; stroke-width: 1.5; }
    .tblt { font-size: 12px; font-weight: 700; text-anchor: middle; }
    .out { fill: #e9f6df; stroke: #7cc24c; stroke-width: 1.5; }
    .outt { font-size: 10.5px; font-weight: 700; text-anchor: middle; }
    .arrow { stroke: #0E97EE; stroke-width: 1.8; fill: none; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0E97EE"/>
    </marker>
  </defs>

  <ellipse class="start" cx="320" cy="52" rx="130" ry="34"/>
  <text class="startt" x="320" y="48">Model definition:</text>
  <text class="startt" x="320" y="64">Elements and Restrictions</text>

  <line class="arrow" x1="320" y1="86" x2="320" y2="118" marker-end="url(#arr)"/>
  <rect class="proc" x="190" y="120" width="260" height="42" rx="4"/>
  <text class="proct" x="320" y="138">Generate the SQL</text>
  <text class="proct" x="320" y="153">and query the database</text>

  <line class="arrow" x1="320" y1="162" x2="320" y2="194" marker-end="url(#arr)"/>
  <rect class="tbl" x="235" y="196" width="170" height="56" rx="4"/>
  <rect class="tblh" x="235" y="196" width="170" height="14" rx="4"/>
  <text class="tblt" x="320" y="232">Result Table</text>

  <line class="arrow" x1="320" y1="252" x2="320" y2="284" marker-end="url(#arr)"/>
  <rect class="proc" x="130" y="286" width="380" height="58" rx="4"/>
  <text class="proct" x="320" y="305">Generate the report result components:</text>
  <text class="proct" x="320" y="320">1 Summary Table, 1 to N Pages containing</text>
  <text class="proct" x="320" y="335">1 Page Table, 1 Data Table and Series</text>

  <line class="arrow" x1="320" y1="344" x2="320" y2="376" marker-end="url(#arr)"/>

  <rect class="out" x="20" y="400" width="110" height="48" rx="4"/>
  <text class="outt" x="75" y="421">1 Summary</text>
  <text class="outt" x="75" y="435">Table</text>
  <g>
    <rect class="out" x="145" y="400" width="110" height="48" rx="4" transform="translate(10,-10)"/>
    <rect class="out" x="145" y="400" width="110" height="48" rx="4" transform="translate(5,-5)"/>
    <rect class="out" x="145" y="400" width="110" height="48" rx="4"/>
    <text class="outt" x="200" y="428">Pages</text>
  </g>
  <rect class="out" x="270" y="400" width="110" height="48" rx="4"/>
  <text class="outt" x="325" y="421">1 Page Table</text>
  <text class="outt" x="325" y="435">per page</text>
  <rect class="out" x="395" y="400" width="110" height="48" rx="4"/>
  <text class="outt" x="450" y="421">1 Data Table</text>
  <text class="outt" x="450" y="435">per page</text>
  <rect class="out" x="520" y="400" width="100" height="48" rx="4"/>
  <text class="outt" x="570" y="421">Series</text>
  <text class="outt" x="570" y="435">per page</text>
</svg>
